name: Daily Market Rotation Report

on:
  schedule:
    # Post-close: 21:00 UTC (5:00 PM ET) — fresh EOD data
    - cron: '00 21 * * 1-5'
    # Pre-open:  12:30 UTC (8:30 AM ET) — review yesterday's signals before open
    - cron: '30 12 * * 1-5'
  workflow_dispatch:            # allow manual trigger for testing

jobs:
  daily-batch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: market-rotation-tracker/package.json

      - name: Install dependencies
        working-directory: market-rotation-tracker
        run: npm install

      - name: Run daily batch
        working-directory: market-rotation-tracker
        env:
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISCORD_WEBHOOK_SUMMARY: ${{ secrets.DISCORD_WEBHOOK_SUMMARY }}
        run: npm run batch

      - name: Upload daily report artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ github.run_id }}
          path: market-rotation-tracker/reports/daily/
          retention-days: 90
        if: always()   # upload even if batch exits with partial data
